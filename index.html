<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RBI Banking Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard/css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div class="loading-veil" id="loading-veil">
    <div class="loader">
      <div class="spinner"></div>
      <div class="loader-text">Loading RBI data</div>
    </div>
  </div>

  <header class="app-header">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-text">
        <div class="brand-title">RBI Banking Analytics</div>
        <div class="brand-sub">Bank-wise ATM/POS/Card Statistics</div>
      </div>
    </div>
    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="overview">Overview</button>
      <button class="tab" data-tab="infrastructure">Infrastructure</button>
      <button class="tab" data-tab="cards">Card Withdrawal</button>
      <button class="tab" data-tab="compare">Bank Comparison</button>
      <button class="tab" data-tab="market">Market Share</button>
      <button class="tab" data-tab="productivity">Productivity</button>
      <button class="tab" data-tab="quality">Data Quality</button>
    </nav>
  </header>

  <section class="filter-bar" id="filter-bar"></section>

  <main class="app-main" id="app-main"></main>

  <footer class="app-foot">
    <span id="foot-meta"></span>
    <span class="foot-source">Source: Reserve Bank of India · rbi.org.in</span>
  </footer>

  <!-- Floating chatbot (was the "Ask" tab; revert by re-adding tab + ask import in app.js) -->
  <div id="chatbot-mount"></div>

  <script type="module" src="dashboard/js/app.js"></script>
</body>
</html>
