name: Update RBI ATM data

on:
  schedule:
    # Twice a month at 06:00 UTC — 5th catches new-month publishes,
    # 20th catches mid-month revisions. RBI publishes ~6-8 weeks after
    # month-end and re-publishes "(Revised)" versions for several months.
    - cron: '0 6 5,20 * *'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/update.yml'
      - 'requirements.txt'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch + parse
        working-directory: scripts
        run: python run.py

      - name: Commit and push if changed
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Update RBI ATM data ($(date -u +%Y-%m-%d))"
            git push
          fi
